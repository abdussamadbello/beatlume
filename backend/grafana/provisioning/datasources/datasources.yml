apiVersion: 1

# Datasources are recreated on container start from this file.
# editable: true lets you tweak in the UI for testing — edits don't survive restart.
# Flip to false for staging/prod to lock the config.

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      # Exemplar hop: click a Prometheus query spike → jump to the matching trace in Jaeger.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      # Trace-to-metrics: open a span in Jaeger, get one-click links to Prometheus queries
      # scoped to the same HTTP route. Metric names match OTel Python semconv output.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: http.route
            value: http_route
        queries:
          - name: "Request rate (per route)"
            query: 'sum(rate(http_server_duration_milliseconds_count{http_route="$${__tags.http_route}"}[5m]))'
          - name: "p95 latency (per route)"
            query: 'histogram_quantile(0.95, sum(rate(http_server_duration_milliseconds_bucket{http_route="$${__tags.http_route}"}[5m])) by (le))'
          - name: "Error rate (per route)"
            query: 'sum(rate(http_server_duration_milliseconds_count{http_route="$${__tags.http_route}",http_status_code=~"5.."}[5m]))'
      nodeGraph:
        enabled: true
